<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — FSBOClass.com</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div style="position:fixed;top:0;left:0;right:0;height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;">
    <a href="/" style="font-family:'Anton',sans-serif;font-size:22px;color:var(--orange);text-decoration:none;letter-spacing:1px;">FSBOCLASS</a>
  </div>

  <div class="auth-page" style="padding-top:80px;">
    <div class="auth-card">
      <div class="auth-title">Welcome Back</div>
      <div class="auth-sub">Sign in to continue your FSBO education.</div>

      <div id="error-msg" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;font-size:14px;color:#f87171;margin-bottom:20px;"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary btn-full" style="margin-top:8px;">Sign In</button>
      </form>

      <div style="text-align:center;margin:20px 0;color:var(--muted);font-size:13px;">— or demo access —</div>
      <div style="display:grid;gap:10px;">
        <button onclick="demoLogin('foundations')" class="btn-secondary" style="width:100%;cursor:pointer;font-size:13px;">Demo: Foundations ($97)</button>
        <button onclick="demoLogin('complete')" class="btn-secondary" style="width:100%;cursor:pointer;font-size:13px;">Demo: Complete ($197)</button>
        <button onclick="demoLogin('masterclass')" class="btn-secondary" style="width:100%;cursor:pointer;font-size:13px;">Demo: Masterclass ($397)</button>
      </div>

      <div class="auth-footer">Don't have an account? <a href="/fsbo-pricing.html">Get started →</a></div>
    </div>
  </div>

  <script src="/js/fsbo-config.js"></script>
  <script src="/js/fsbo-auth.js"></script>
  <script>
    if (FSBOAuth.isLoggedIn()) {
      const r = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = r || '/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      // Demo: any password works, tier defaults to foundations
      FSBOAuth.login(email, 'masterclass');
      const r = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = r || '/dashboard.html';
    });

    function demoLogin(tier) {
      FSBOAuth.login('demo@fsboclass.com', tier);
      const r = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = r || '/dashboard.html';
    }
  </script>
</body>
</html>
